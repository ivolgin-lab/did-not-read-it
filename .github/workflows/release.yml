name: Stable Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

  docker:
    runs-on: ubuntu-latest
    needs: version
    strategy:
      matrix:
        target: [app, migrations]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push ${{ matrix.target }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            quay.io/divolgin/didnotreadit-${{ matrix.target }}:${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  replicated:
    needs: [version, docker]
    uses: ./.github/workflows/replicated-release.yml
    with:
      channel: Stable
      version: ${{ needs.version.outputs.version }}
    secrets:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      REPLICATED_APP: ${{ secrets.REPLICATED_APP }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
