name: Replicated Release

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      version:
        required: true
        type: string
    secrets:
      REPLICATED_API_TOKEN:
        required: true
      REPLICATED_APP:
        required: true
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_PASSWORD:
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      channel-slug: ${{ steps.create-release.outputs.channel-slug }}
      release-sequence: ${{ steps.create-release.outputs.release-sequence }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Install Replicated CLI
        run: |
          curl -sL https://github.com/replicatedhq/replicated/releases/download/v0.124.5/replicated_0.124.5_linux_amd64.tar.gz \
            | sudo tar xz -C /usr/local/bin replicated

      - name: Stamp release version into chart and manifests
        run: |
          # The .replicated config tells `replicated release create` to
          # auto-package chart/ and bundle the manifests/*.yaml files into
          # a single release. The chart version is read from Chart.yaml, and
          # the HelmChart manifest pins that version, so we substitute the
          # release version into both before invoking the CLI.
          sed -i "s/^version: .*/version: ${{ inputs.version }}/" chart/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${{ inputs.version }}\"/" chart/Chart.yaml
          sed -i "s/__VERSION__/${{ inputs.version }}/g" manifests/didnotreadit.yaml
          helm dependency build chart/

      - name: Create Replicated release
        id: create-release
        env:
          REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
          REPLICATED_APP: ${{ secrets.REPLICATED_APP }}
        run: |
          OUTPUT=$(replicated release create \
            --version "${{ inputs.version }}" \
            --promote "${{ inputs.channel }}" \
            --ensure-channel \
            --output json)
          echo "$OUTPUT"
          SEQUENCE=$(echo "$OUTPUT" | jq -r '.sequence')
          CHANNEL_SLUG=$(replicated channel ls --output json \
            | jq -r --arg name "${{ inputs.channel }}" '.[] | select(.name == $name) | .channelSlug')
          echo "release-sequence=$SEQUENCE" >> "$GITHUB_OUTPUT"
          echo "channel-slug=$CHANNEL_SLUG" >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: Create customer
        id: create-customer
        uses: replicatedhq/replicated-actions/create-customer@v1
        with:
          app-slug: ${{ secrets.REPLICATED_APP }}
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          customer-name: ci-${{ inputs.channel }}-${{ inputs.version }}
          channel-slug: ${{ needs.release.outputs.channel-slug }}
          customer-email: ci-${{ inputs.channel }}@example.com
          expires-in: 1
          license-type: dev
          is-kots-install-enabled: "false"

      - name: Create CMX k3s cluster
        id: create-cluster
        uses: replicatedhq/replicated-actions/create-cluster@v1
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          kubernetes-distribution: k3s
          kubernetes-version: "1.32"
          cluster-name: ci-${{ inputs.channel }}-${{ inputs.version }}
          ttl: 30m
          timeout-minutes: 5

      - name: Install via Replicated registry
        uses: replicatedhq/replicated-actions/helm-install@v1
        with:
          kubeconfig: ${{ steps.create-cluster.outputs.cluster-kubeconfig }}
          helm-path: helm
          chart: oci://registry.replicated.com/${{ secrets.REPLICATED_APP }}/${{ needs.release.outputs.channel-slug }}/didnotreadit
          name: didnotreadit
          version: ${{ inputs.version }}
          namespace: default
          registry-username: ci-${{ inputs.channel }}@example.com
          registry-password: ${{ steps.create-customer.outputs.license-id }}

      - name: Test /d/all returns 200
        run: |
          echo "${{ steps.create-cluster.outputs.cluster-kubeconfig }}" > kubeconfig.yaml
          export KUBECONFIG=kubeconfig.yaml
          kubectl rollout status deployment/didnotreadit-app --timeout=180s || {
            echo "=== Rollout timed out, debugging ==="
            kubectl get pods -o wide
            kubectl describe pod -l app.kubernetes.io/component=app
            kubectl logs -l app.kubernetes.io/component=app --all-containers --tail=50 || true
            exit 1
          }
          kubectl port-forward svc/didnotreadit-app 3000:3000 &
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/d/all)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Remove cluster
        if: always()
        uses: replicatedhq/replicated-actions/remove-cluster@v1
        continue-on-error: true
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          cluster-id: ${{ steps.create-cluster.outputs.cluster-id }}

      - name: Archive customer
        if: always()
        uses: replicatedhq/replicated-actions/archive-customer@v1
        continue-on-error: true
        with:
          api-token: ${{ secrets.REPLICATED_API_TOKEN }}
          customer-id: ${{ steps.create-customer.outputs.customer-id }}
