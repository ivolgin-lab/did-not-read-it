name: Unstable Release

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          # SemVer 2.0.0 forbids leading zeros in numeric segments and in
          # numeric prerelease identifiers. The HHMMSS time and an all-digit
          # short SHA can both trip that, so:
          #   - strip the leading zero from HHMMSS by forcing base-10 arithmetic
          #   - prefix the SHA with `g` (git-describe convention) so the
          #     prerelease identifier is always alphanumeric
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          DATE=$(date -u +%Y%m%d)
          TIME=$((10#$(date -u +%H%M%S)))
          VERSION="0.${DATE}.${TIME}-g${SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build Next.js
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        target: [app, migrations]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build and push ${{ matrix.target }} image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            quay.io/divolgin/didnotreadit-${{ matrix.target }}:${{ needs.build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ""
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            quay.io/divolgin/didnotreadit-${{ matrix.target }}@${{ steps.build-push.outputs.digest }}

      - name: Verify image signature
        run: |
          cosign verify --key cosign.pub \
            quay.io/divolgin/didnotreadit-${{ matrix.target }}@${{ steps.build-push.outputs.digest }}

  replicated:
    needs: [build, docker]
    uses: ./.github/workflows/replicated-release.yml
    with:
      channel: Unstable
      version: ${{ needs.build.outputs.version }}
    secrets:
      REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
      REPLICATED_APP: ${{ secrets.REPLICATED_APP }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
