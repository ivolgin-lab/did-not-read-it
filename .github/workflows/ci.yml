name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: version
        run: |
          SHA=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)
          VERSION="0.$(date -u +%Y%m%d.%H%M%S)-${SHA}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build Next.js
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        target: [app, migrations]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push ${{ matrix.target }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/didnotreadit-${{ matrix.target }}:${{ needs.build.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test:
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Install Replicated CLI
        run: |
          curl -sL https://github.com/replicatedhq/replicated/releases/download/v0.124.5/replicated_0.124.5_linux_amd64.tar.gz | tar xz -C /usr/local/bin replicated

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Create CMX k3s cluster
        id: cluster
        env:
          REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
        run: |
          CLUSTER_ID=$(replicated cluster create \
            --distribution k3s \
            --nodes 1 \
            --name "ci-didnotreadit-${{ needs.build.outputs.version }}" \
            --ttl 30m \
            --wait 5m \
            -ojson | jq -r '.id')
          echo "id=$CLUSTER_ID" >> "$GITHUB_OUTPUT"

      - name: Get kubeconfig
        env:
          REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
        run: |
          replicated cluster kubeconfig ${{ steps.cluster.outputs.id }} --output-path kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> "$GITHUB_ENV"

      - name: Build Helm dependencies
        run: helm dependency build chart/

      - name: Deploy with Helm
        run: |
          helm install didnotreadit chart/ \
            --set app.image.tag=${{ needs.build.outputs.version }} \
            --set migrations.image.tag=${{ needs.build.outputs.version }} \
            --set postgresql.auth.password=testpassword \
            --set imagePullSecret.registry=dhi.io \
            --set imagePullSecret.username=${{ secrets.DOCKERHUB_USERNAME }} \
            --set imagePullSecret.password=${{ secrets.DOCKERHUB_PASSWORD }} \
            --set "global.imagePullSecrets[0]=didnotreadit-pull-secret" \
            --set global.security.allowInsecureImages=true \
            --wait \
            --timeout 5m

      - name: Wait for app to be ready
        run: kubectl rollout status deployment/didnotreadit-app --timeout=120s

      - name: Test /api/health returns 200
        run: |
          kubectl port-forward svc/didnotreadit-app 3000:3000 &
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/api/health)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Delete CMX cluster
        if: always()
        env:
          REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
        run: |
          if [ -n "${{ steps.cluster.outputs.id }}" ]; then
            replicated cluster rm ${{ steps.cluster.outputs.id }}
          fi
