name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build Next.js
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      matrix:
        target: [app, migrations]
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Build and push ${{ matrix.target }} image
        id: build-push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          tags: |
            quay.io/divolgin/didnotreadit-${{ matrix.target }}:v0.0.0-${{ steps.tag.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign image with cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ""
        run: |
          cosign sign --key env://COSIGN_PRIVATE_KEY --yes \
            quay.io/divolgin/didnotreadit-${{ matrix.target }}@${{ steps.build-push.outputs.digest }}

  test:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Install Replicated CLI
        run: |
          curl -sL https://github.com/replicatedhq/replicated/releases/download/v0.124.5/replicated_0.124.5_linux_amd64.tar.gz | tar xz -C /usr/local/bin replicated

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Set image tag
        id: tag
        run: echo "sha=$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Create CMX k3s cluster
        id: cluster
        env:
          REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
        run: |
          CLUSTER_ID=$(replicated cluster create \
            --distribution k3s \
            --nodes 1 \
            --name "ci-didnotreadit-${{ steps.tag.outputs.sha }}" \
            --ttl 1h \
            --wait 5m \
            -ojson | jq -r '.id')
          echo "id=$CLUSTER_ID" >> "$GITHUB_OUTPUT"

      - name: Get kubeconfig
        env:
          REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
        run: |
          replicated cluster kubeconfig ${{ steps.cluster.outputs.id }} --output-path kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> "$GITHUB_ENV"

      - name: Build Helm dependencies
        run: helm dependency build chart/

      - name: Deploy with Helm
        run: |
          helm install didnotreadit chart/ \
            --set app.image.repository=quay.io/divolgin/didnotreadit-app \
            --set app.image.tag=v0.0.0-${{ steps.tag.outputs.sha }} \
            --set migrations.image.repository=quay.io/divolgin/didnotreadit-migrations \
            --set migrations.image.tag=v0.0.0-${{ steps.tag.outputs.sha }} \
            --set postgresql.image.registry=dhi.io \
            --set postgresql.image.repository=postgres \
            --set postgresql.auth.password=testpassword \
            --set imagePullSecret.credentials[0].registry=quay.io \
            --set imagePullSecret.credentials[0].username=${{ secrets.QUAY_USERNAME }} \
            --set imagePullSecret.credentials[0].password=${{ secrets.QUAY_PASSWORD }} \
            --set imagePullSecret.credentials[1].registry=dhi.io \
            --set imagePullSecret.credentials[1].username=${{ secrets.DOCKERHUB_USERNAME }} \
            --set imagePullSecret.credentials[1].password=${{ secrets.DOCKERHUB_PASSWORD }} \
            --set "global.imagePullSecrets[0].name=didnotreadit-pull-secret" \
            --set global.security.allowInsecureImages=true \
            --set replicated.enabled=false \
            --wait \
            --timeout 5m

      - name: Wait for app to be ready
        run: kubectl rollout status deployment/didnotreadit-app --timeout=120s

      - name: Test /d/all returns 200
        run: |
          kubectl port-forward svc/didnotreadit-app 3000:3000 &
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/d/all)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Delete CMX cluster
        if: always()
        env:
          REPLICATED_API_TOKEN: ${{ secrets.REPLICATED_API_TOKEN }}
        run: |
          if [ -n "${{ steps.cluster.outputs.id }}" ]; then
            replicated cluster rm ${{ steps.cluster.outputs.id }}
          fi
