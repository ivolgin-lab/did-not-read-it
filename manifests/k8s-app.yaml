apiVersion: app.k8s.io/v1beta1
kind: Application
metadata:
  name: didnotreadit
  labels:
    app.kubernetes.io/name: didnotreadit
spec:
  descriptor:
    links:
      - description: Open did not read it
        url: 'repl{{ if ConfigOptionEquals "ingress_enabled" "1" }}repl{{ if ConfigOptionEquals "ingress_tls_enabled" "1" }}https://repl{{ else }}http://repl{{ end }}repl{{ ConfigOption "ingress_hostname" }}repl{{ end }}'
