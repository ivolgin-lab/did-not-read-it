apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: didnotreadit
spec:
  # The chart name and version must match the .tgz packaged from chart/.
  # __VERSION__ is replaced by the release workflow with the actual release
  # version before the manifests are uploaded.
  chart:
    name: didnotreadit
    chartVersion: __VERSION__
  releaseName: didnotreadit

  # Values pulled from the Config screen / license. The Config item
  # `postgres_password` defaults to repl{{ RandomString 32 }} which is
  # generated once and persisted by KOTS, so the password survives upgrades.
  values:
    postgresql:
      auth:
        password: 'repl{{ ConfigOption "postgres_password" }}'
    global:
      imagePullSecrets:
        - name: 'repl{{ ImagePullSecretName }}'

  optionalValues:
    - when: 'repl{{ ConfigOptionEquals "ingress_enabled" "1" }}'
      recursiveMerge: true
      values:
        app:
          ingress:
            enabled: true
            hosts:
              - 'repl{{ ConfigOption "ingress_hostname" }}'
            tls:
              enabled: repl{{ ConfigOptionEquals "ingress_tls_enabled" "1" }}
              crt: 'repl{{ ConfigOption "ingress_tls_cert" | Base64Encode }}'
              key: 'repl{{ ConfigOption "ingress_tls_key" | Base64Encode }}'
