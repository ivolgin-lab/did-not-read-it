apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: didnotreadit
spec:
  # The chart name and version must match the .tgz packaged from chart/.
  # __VERSION__ is replaced by the release workflow with the actual release
  # version before the manifests are uploaded.
  chart:
    name: didnotreadit
    chartVersion: __VERSION__
  releaseName: didnotreadit

  # Values pulled from the Config screen / license. The Config item
  # `postgres_password` defaults to repl{{ RandomString 32 }} which is
  # generated once and persisted by KOTS, so the password survives upgrades.
  values:
    app:
      image:
        repository: 'repl{{ LocalImageName "quay.io/divolgin/didnotreadit-app" }}'
      service:
        type: 'repl{{ if ConfigOptionEquals "ingress_enabled" "1" }}ClusterIPrepl{{ else }}NodePortrepl{{ end }}'
        nodePort: 30000
      ingress:
        enabled: repl{{ ConfigOptionEquals "ingress_enabled" "1" }}
        hosts:
          - 'repl{{ ConfigOption "ingress_hostname" }}'
        tls:
          enabled: repl{{ ConfigOptionEquals "ingress_tls_enabled" "1" }}
          crt: 'repl{{ ConfigOption "ingress_tls_cert" | Base64Encode }}'
          key: 'repl{{ ConfigOption "ingress_tls_key" | Base64Encode }}'
    migrations:
      image:
        repository: 'repl{{ LocalImageName "quay.io/divolgin/didnotreadit-migrations" }}'
    ingress-nginx:
      enabled: repl{{ ConfigOptionEquals "ingress_enabled" "1" }}
    postgresql:
      enabled: repl{{ ConfigOptionEquals "postgres_type" "embedded" }}
      image:
        registry: 'repl{{ LocalRegistryHost }}'
        repository: 'repl{{ LocalRegistryNamespace }}/postgres'
      auth:
        password: 'repl{{ ConfigOption "postgres_password" }}'
    externalDatabase:
      url: 'repl{{ if ConfigOptionEquals "postgres_type" "external" }}postgresql://repl{{ ConfigOption "external_postgres_user" }}:repl{{ ConfigOption "external_postgres_password" }}@repl{{ ConfigOption "external_postgres_host" }}:repl{{ ConfigOption "external_postgres_port" }}/repl{{ ConfigOption "external_postgres_database" }}repl{{ end }}'
    replicated:
      image:
        registry: 'repl{{ LocalRegistryHost }}'
        repository: 'repl{{ LocalRegistryNamespace }}/replicated-sdk-image'
    global:
      imagePullSecrets:
        - name: 'repl{{ ImagePullSecretName }}'
