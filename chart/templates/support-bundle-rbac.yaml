# ServiceAccount for the support-bundle Job (needs cluster-wide read access)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "didnotreadit.fullname" . }}-support-bundle
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "didnotreadit.fullname" . }}-support-bundle
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        rbac.authorization.k8s.io/aggregate-to-view: "true"
rules: []  # rules are automatically filled by the controller manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "didnotreadit.fullname" . }}-support-bundle-extras
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "didnotreadit.fullname" . }}-support-bundle
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "didnotreadit.fullname" . }}-support-bundle-extras
subjects:
  - kind: ServiceAccount
    name: {{ include "didnotreadit.fullname" . }}-support-bundle
    namespace: {{ .Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "didnotreadit.fullname" . }}-support-bundle-view
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: {{ include "didnotreadit.fullname" . }}-support-bundle
    namespace: {{ .Release.Namespace }}
---
# ServiceAccount for the app (needs to create/read/delete Jobs and read Pods)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "didnotreadit.fullname" . }}-app
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "didnotreadit.fullname" . }}-app
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "didnotreadit.fullname" . }}-app
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "didnotreadit.fullname" . }}-app
subjects:
  - kind: ServiceAccount
    name: {{ include "didnotreadit.fullname" . }}-app
    namespace: {{ .Release.Namespace }}
