# ServiceAccount used by the app pod. The support-bundle binary runs in-process
# inside the app container, so the app SA itself needs cluster-wide read access
# to satisfy the troubleshoot collectors (logs, cluster resources, nodes, etc.).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "didnotreadit.fullname" . }}-app
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
---
# Bind the built-in `view` ClusterRole — covers most read-only collectors.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "didnotreadit.fullname" . }}-app-view
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
  - kind: ServiceAccount
    name: {{ include "didnotreadit.fullname" . }}-app
    namespace: {{ .Release.Namespace }}
---
# Extras the `view` role doesn't grant: pod logs, secret discovery (for
# locating in-cluster SupportBundle specs), nodes, storage classes.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "didnotreadit.fullname" . }}-app-extras
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
  - apiGroups: ["storage.k8s.io"]
    resources: ["storageclasses"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "didnotreadit.fullname" . }}-app-extras
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "didnotreadit.fullname" . }}-app-extras
subjects:
  - kind: ServiceAccount
    name: {{ include "didnotreadit.fullname" . }}-app
    namespace: {{ .Release.Namespace }}
