apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "didnotreadit.fullname" . }}-app
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      {{- include "didnotreadit.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "didnotreadit.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      serviceAccountName: {{ include "didnotreadit.fullname" . }}-app
      {{- if .Values.imagePullSecret.credentials }}
      imagePullSecrets:
        - name: {{ include "didnotreadit.pullSecretName" . }}
      {{- else if .Values.replicated.enabled }}
      imagePullSecrets:
        - name: enterprise-pull-secret
      {{- end }}
      initContainers:
        - name: migrations
          image: {{ include "didnotreadit.migrationsImage" . }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          env:
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: DB_HOST
              value: {{ .Release.Name }}-postgresql
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "didnotreadit.secretName" . }}
                  key: database-url
            {{- end }}
      containers:
        - name: app
          image: {{ include "didnotreadit.appImage" . }}
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: DATABASE_URL
              value: "postgresql://{{ .Values.postgresql.auth.username }}:$(POSTGRES_PASSWORD)@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "didnotreadit.secretName" . }}
                  key: database-url
            {{- end }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "didnotreadit.secretName" . }}
                  key: session-secret
            - name: COOKIE_SECURE
              value: {{ .Values.app.ingress.tls.enabled | quote }}
            - name: METRICS_ENABLED
              value: {{ .Values.app.metrics.enabled | quote }}
            - name: METRICS_INTERVAL_MS
              value: {{ .Values.app.metrics.intervalMs | quote }}
            {{- if .Values.replicated.enabled }}
            - name: REPLICATED_SDK_URL
              value: http://{{ .Values.replicated.nameOverride | default "replicated" }}:3000
            - name: REPLICATED_SDK_SERVICE
              value: {{ .Values.replicated.nameOverride | default "replicated" }}
            {{- end }}
            - name: HELM_RELEASE_NAME
              value: {{ .Release.Name }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
