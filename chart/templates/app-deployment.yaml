apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "didnotreadit.fullname" . }}-app
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      {{- include "didnotreadit.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        {{- include "didnotreadit.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: {{ include "didnotreadit.appImage" . }}
          imagePullPolicy: {{ .Values.app.image.pullPolicy }}
          command: ["npm", "start"]
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            {{- end }}
            - name: DATABASE_URL
              {{- if .Values.postgresql.enabled }}
              value: {{ include "didnotreadit.databaseUrl" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "didnotreadit.secretName" . }}
                  key: database-url
              {{- end }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "didnotreadit.secretName" . }}
                  key: session-secret
          livenessProbe:
            httpGet:
              path: /d/all
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /d/all
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
