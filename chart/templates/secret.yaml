apiVersion: v1
kind: Secret
metadata:
  name: {{ include "didnotreadit.secretName" . }}
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
type: Opaque
stringData:
  session-secret: {{ .Values.app.sessionSecret | default (randAlphaNum 32) | quote }}
  {{- if .Values.postgresql.enabled }}
  database-url: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username (.Values.postgresql.auth.password | default "UNSET") .Release.Name .Values.postgresql.auth.database | quote }}
  postgres-password: {{ .Values.postgresql.auth.password | default "UNSET" | quote }}
  {{- else }}
  database-url: {{ .Values.externalDatabase.url | quote }}
  {{- end }}
