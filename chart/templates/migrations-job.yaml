apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "didnotreadit.fullname" . }}-migrations-{{ .Release.Revision }}
  labels:
    {{- include "didnotreadit.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "didnotreadit.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrations
          image: {{ include "didnotreadit.migrationsImage" . }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          env:
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: password
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.auth.username | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.auth.database | quote }}
            - name: DB_HOST
              value: {{ .Release.Name }}-postgresql
            {{- end }}
            - name: DATABASE_URL
              {{- if .Values.postgresql.enabled }}
              value: {{ include "didnotreadit.databaseUrl" . | quote }}
              {{- else }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "didnotreadit.secretName" . }}
                  key: database-url
              {{- end }}
