app:
  replicaCount: 1
  image:
    repository: ivolginlab/didnotreadit-app
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  sessionSecret: ""  # auto-generated if empty
  ingress:
    enabled: false
    className: ""
    annotations: {}
    host: ""
    tls:
      enabled: false
      secretName: ""

migrations:
  image:
    repository: ivolginlab/didnotreadit-migrations
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

# Bitnami PostgreSQL subchart — enabled by default
postgresql:
  enabled: true
  image:
    registry: dhi.io
    repository: postgres
    tag: 16-alpine3.22
  auth:
    username: didnotreadit
    password: ""       # auto-generated by bitnami if empty
    database: didnotreadit
  primary:
    containerSecurityContext:
      runAsUser: 70
    podSecurityContext:
      fsGroup: 70
    persistence:
      size: 10Gi

# Image pull credentials — creates a pull secret when all three are set
imagePullSecret:
  registry: ""
  username: ""
  password: ""

# External database — used when postgresql.enabled is false
externalDatabase:
  url: ""  # e.g. postgresql://user:pass@host:5432/dbname
