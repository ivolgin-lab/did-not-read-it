app:
  replicaCount: 1
  image:
    repository: proxy.ivolg.in/proxy/didnotreadit/index.docker.io/ivolginlab/didnotreadit-app
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  sessionSecret: ""  # auto-generated if empty
  metrics:
    enabled: "true"       # set to "false" to disable metrics reporting
    intervalMs: "300000"  # 5 minutes
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls:
      enabled: false
      secretName: ""
      crt: ""   # base64-encoded TLS certificate (fullchain)
      key: ""   # base64-encoded TLS private key

migrations:
  image:
    repository: proxy.ivolg.in/proxy/didnotreadit/index.docker.io/ivolginlab/didnotreadit-migrations
    tag: ""  # defaults to Chart.appVersion
    pullPolicy: IfNotPresent

# Bitnami PostgreSQL subchart — enabled by default
postgresql:
  enabled: true
  image:
    registry: proxy.ivolg.in
    repository: proxy/didnotreadit/dhi.io/postgres
    tag: 16-alpine3.22
  auth:
    username: didnotreadit
    password: ""       # auto-generated by bitnami if empty
    database: didnotreadit
  primary:
    containerSecurityContext:
      runAsUser: 70
      runAsGroup: 70
    podSecurityContext:
      fsGroup: 70
    initContainers:
      - name: fix-permissions
        image: "{{ include \"postgresql.v1.image\" . }}"
        command: ["/bin/sh", "-c"]
        args:
          - chown -R 70:70 /bitnami/postgresql && chmod 0750 /bitnami/postgresql/data || true
        securityContext:
          runAsUser: 0
        volumeMounts:
          - name: data
            mountPath: /bitnami/postgresql
    persistence:
      size: 10Gi

# Image pull credentials — creates a pull secret when credentials are provided
# Supports multiple registries (e.g. Docker Hub + dhi.io)
imagePullSecret:
  credentials: []
  # - registry: proxy.ivolg.in
  #   username: ""
  #   password: ""  # license ID

# Replicated SDK subchart — requires a license, disable for plain Helm installs
replicated:
  enabled: true
  nameOverride: didnotreadit-sdk
  image:
    registry: proxy.ivolg.in

# Global settings for subcharts (bitnami postgresql, replicated SDK)
global:
  security:
    allowInsecureImages: true  # proxied images aren't signed by bitnami
  imagePullSecrets:
    - name: enterprise-pull-secret  # created by replicated SDK subchart

# External database — used when postgresql.enabled is false
externalDatabase:
  url: ""  # e.g. postgresql://user:pass@host:5432/dbname
